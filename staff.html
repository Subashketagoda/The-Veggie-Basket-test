<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | The Veggie Basket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            background: #f9fbf9;
        }

        .staff-container {
            padding: 120px 5% 50px;
            max-width: 1000px;
            margin: 0 auto;
            height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            flex: 1;
            background: white;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px 30px;
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
        }

        .msg-received {
            background: #f0f0f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-sent {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .chat-input {
            padding: 20px;
            background: #fff;
            border-top: 1px solid #eee;
            display: flex;
            gap: 15px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #ddd;
            border-radius: 50px;
            outline: none;
        }

        .send-btn {
            background: var(--primary);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 12px;">
                <img src="logo.png" alt="Logo">
                <span>Staff Portal</span>
            </a>
        </div>
    </nav>

    <div class="staff-container">
        <div class="chat-box">
            <div class="chat-header">
                <h3>Staff Internal Chat</h3>
                <div style="font-size: 0.8rem; opacity: 0.8;">Active: 4 Online</div>
            </div>
            <div class="chat-messages" id="staff-chat-msgs">
                <div class="message msg-received">
                    <strong>Admin:</strong> Good morning team! Let's ensure all fresh vegetables are logged by 9 AM.
                </div>
                <!-- messages here -->
            </div>
            <div class="chat-input">
                <input type="text" id="staff-msg-input" placeholder="Type a message...">
                <div class="send-btn" onclick="sendStaffMsg()"><i class="fas fa-paper-plane"></i></div>
            </div>
        </div>
    </div>

    <script>
        function sendStaffMsg() {
            const input = document.getElementById('staff-msg-input');
            if (!input.value) return;

            const container = document.getElementById('staff-chat-msgs');
            const div = document.createElement('div');
            div.className = 'message msg-sent';
            div.innerHTML = `<strong>You:</strong> ${input.value}`;
            container.appendChild(div);

            input.value = '';
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>

</html>
